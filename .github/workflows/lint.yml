name: Lint Code

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save eslint

      - name: Run ESLint
        id: eslint
        shell: bash
        run: |
          # Run lint, capture output to file, and preserve exit code
          set +e
          npm run lint > eslint_report.txt 2>&1
          EXIT_CODE=$?
          cat eslint_report.txt
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Upload Lint Report
        if: always() # Upload even if lint failed
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint_report.txt


name: Lint Commenter

on:
  workflow_run:
    workflows: ["Lint Code"]
    types:
      - completed

jobs:
  comment:
    runs-on: ubuntu-latest
    if: >
      ${{ github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      pull-requests: write
      actions: read # Required to download artifacts
      contents: read

    steps:
      - name: 'Download artifact'
        uses: actions/github-script@v7
        with:
          script: |
            var artifacts = await github.rest.actions.listWorkflowRunArtifacts({
               owner: context.repo.owner,
               repo: context.repo.repo,
               run_id: ${{github.event.workflow_run.id }},
            });
            var matchArtifact = artifacts.data.artifacts.filter((artifact) => {
              return artifact.name == "eslint-report"
            })[0]
            var download = await github.rest.actions.downloadArtifact({
               owner: context.repo.owner,
               repo: context.repo.repo,
               artifact_id: matchArtifact.id,
               archive_format: 'zip',
            });
            var fs = require('fs');
            fs.writeFileSync('${{github.workspace}}/eslint-report.zip', Buffer.from(download.data));

      - name: 'Unzip artifact'
        run: unzip eslint-report.zip

      - name: 'Comment on PR'
        uses: actions/github-script@v7
        with:
          script: |
            var fs = require('fs');
            
            // Try to read the report
            var report = '';
            try {
              report = fs.readFileSync('./eslint_report.txt', 'utf8');
            } catch (e) {
              console.log('No report file found or readable');
              return;
            }

            // Find the PR number associated with this workflow run
            // workflow_run event doesn't have the PR number directly in the same way
            // But we can get it from the API
            
            var pull_requests = ${{ toJSON(github.event.workflow_run.pull_requests) }};
            if (!pull_requests || pull_requests.length === 0) {
              console.log('No pull request found for this run');
              return;
            }
            
            var pr_number = pull_requests[0].number;

            // Truncate if too long (GitHub limit is ~65k)
            const maxLength = 60000;
            let bodyContent = report;
            if (report.length > maxLength) {
              bodyContent = report.substring(0, maxLength) + '\n... (Output truncated)';
            }

            const body = '#### Hello!\n\n' +
              '**I found the following linting issues in your pull request:**\n\n' +
              '<details open>\n' +
              '<summary>Click to see linting errors</summary>\n\n' +
              '```text\n' +
              bodyContent + '\n' +
              '```\n\n' +
              '</details>\n\n' +
              '<sup>This check was done automatically. Please fix these issues and push again.</sup>';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body: body
            });

